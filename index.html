<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Natya Shastra</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* BACKGROUND SLIDESHOW */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.background img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: slide 36s infinite;
}

.background img:nth-child(1) { animation-delay: 0s; }
.background img:nth-child(2) { animation-delay: 6s; }
.background img:nth-child(3) { animation-delay: 12s; }
.background img:nth-child(4) { animation-delay: 18s; }
.background img:nth-child(5) { animation-delay: 24s; }
.background img:nth-child(6) { animation-delay: 30s; }

@keyframes slide {
    0% { opacity: 0; }
    5% { opacity: 1; }
    20% { opacity: 1; }
    25% { opacity: 0; }
    100% { opacity: 0; }
}

/* WATERMARK */
.watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.12;
    z-index: 0;
}

.watermark img {
    width: 300px;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    padding: 15px 30px;
    background: rgba(0,0,0,0.6);
    position: relative;
    z-index: 2;
}

.logo {
    height: 55px;
}

nav {
    margin-left: auto;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-size: 18px;
}

/* MAIN CONTENT */
.container {
    text-align: center;
    margin-top: 120px;
    padding: 20px;
    position: relative;
    z-index: 2;
}

h1 {
    font-size: 48px;
}

h2 {
    font-size: 26px;
    margin-top: 10px;
    font-weight: normal;
}

p {
    max-width: 800px;
    margin: 20px auto;
    font-size: 18px;
    line-height: 1.6;
}

/* BUTTON */
.btn {
    padding: 12px 20px;
    background: rgba(255,255,255,0.2);
    border: 1px solid white;
    color: white;
    text-decoration: none;
    font-size: 18px;
    margin-top: 20px;
    display: inline-block;
}

/* AUDIO BUTTON */
.audio-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    padding: 12px 18px;
    cursor: pointer;
    z-index: 3;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="background">
    <img src="backdrop.jpg">
    <img src="backdrop1.png">
    <img src="backdrop2.png">
    <img src="backdrop3.png">
    <img src="backdrop4.png">
    <img src="backdrop5.png">
</div>

<!-- WATERMARK -->
<div class="watermark">
    <img src="logo.png">
</div>

<!-- HEADER -->
<header>
    <img src="logo.png" class="logo">

    <nav>
        <a href="index.html">Home</a>
        <a href="author.html">Author</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- MAIN -->
<div class="container">

    <h1>Natya Shastra</h1>

    <h2>Science • Spirituality • Movement</h2>

    <p>
        Exploring the ancient wisdom of Natya Shastra through the lens of
        neuroscience, cosmic energy, and human consciousness.  
        This work bridges classical knowledge with modern understanding.
    </p>

    <a href="author.html" class="btn">About the Author</a>

</div>

<!-- AUDIO -->
<audio id="bg-music" loop>
    <source src="background-music.mp3" type="audio/mpeg">
</audio>

<audio id="flute-music" loop>
    <source src="classicalflute.mp3" type="audio/mpeg">
</audio>

<button class="audio-btn" onclick="toggleMusic()">Play Music</button>

<script>
let playing = false;
const bg = document.getElementById("bg-music");
const flute = document.getElementById("flute-music");

function toggleMusic() {
    if (!playing) {
        bg.volume = 0.4;
        flute.volume = 0.4;
        bg.play();
        flute.play();
        playing = true;
    } else {
        bg.pause();
        flute.pause();
        playing = false;
    }
}
</script>

</body>
</html>
